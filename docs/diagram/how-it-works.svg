<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220" role="img" aria-label="How it works diagram">
  <title>How it works</title>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#1f2937"/>
    </marker>
  </defs>
  <rect width="900" height="220" fill="#f8fafc"/>
  <g font-family="Verdana, sans-serif" font-size="12" fill="#0f172a">
    <rect x="20" y="70" width="100" height="60" rx="10" fill="#e2e8f0" stroke="#cbd5f5"/>
    <text x="70" y="105" text-anchor="middle">URL</text>

    <rect x="140" y="50" width="120" height="100" rx="10" fill="#e2e8f0" stroke="#cbd5f5"/>
    <text x="200" y="85" text-anchor="middle">Lists</text>
    <text x="200" y="105" text-anchor="middle" font-size="11">trusted/white</text>
    <text x="200" y="123" text-anchor="middle" font-size="11">blacklist</text>

    <rect x="280" y="70" width="120" height="60" rx="10" fill="#e2e8f0" stroke="#cbd5f5"/>
    <text x="340" y="105" text-anchor="middle">Corp policy</text>

    <rect x="420" y="50" width="120" height="100" rx="10" fill="#e2e8f0" stroke="#cbd5f5"/>
    <text x="480" y="85" text-anchor="middle">Signals</text>
    <text x="480" y="105" text-anchor="middle" font-size="11">brand/form</text>
    <text x="480" y="123" text-anchor="middle" font-size="11">domain</text>

    <rect x="560" y="70" width="110" height="60" rx="10" fill="#e2e8f0" stroke="#cbd5f5"/>
    <text x="615" y="105" text-anchor="middle">Similarity</text>

    <rect x="690" y="70" width="120" height="60" rx="10" fill="#e2e8f0" stroke="#cbd5f5"/>
    <text x="750" y="100" text-anchor="middle">ML + heuristic</text>

    <rect x="830" y="50" width="50" height="100" rx="10" fill="#e2e8f0" stroke="#cbd5f5"/>
    <text x="855" y="85" text-anchor="middle">Verdict</text>
    <text x="855" y="105" text-anchor="middle" font-size="11">Actions</text>
  </g>

  <g stroke="#1f2937" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <line x1="120" y1="100" x2="140" y2="100"/>
    <line x1="260" y1="100" x2="280" y2="100"/>
    <line x1="400" y1="100" x2="420" y2="100"/>
    <line x1="540" y1="100" x2="560" y2="100"/>
    <line x1="670" y1="100" x2="690" y2="100"/>
    <line x1="810" y1="100" x2="830" y2="100"/>
  </g>
</svg>
